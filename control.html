<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ห้องควบคุม — VNservice</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VNservice">
<meta name="theme-color" content="#112255">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#112255;--navy2:#0d1a3e;--orange:#f07820;--orange2:#d96010;--bg:#eef2fa;--text:#1a2540;--text-dim:#6a7a9a;--text-mut:#9aa4bc;--border:#dde4f0;--green:#1a9050;--green-bg:#e5f7ee;--red:#cc2f2f;--red-bg:#fde8e8;--blue:#2856b8;--blue-bg:#eef2fb;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
header{background:var(--navy);padding:0 26px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 18px rgba(8,16,48,.3)}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:900;color:#fff}
.logo-icon{width:34px;height:34px;background:linear-gradient(145deg,var(--orange),var(--orange2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(240,120,32,.4)}
.hright{display:flex;align-items:center;gap:12px}
.conn-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border-radius:20px;padding:5px 12px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35)}
.conn-dot.online{background:#4ade80;box-shadow:0 0 5px rgba(74,222,128,.6)}
.conn-text{font-size:11.5px;color:rgba(255,255,255,.75);font-weight:600}
.clock{font-family:'Sarabun',sans-serif;font-size:13px;color:rgba(255,255,255,.6);letter-spacing:.5px}
.hdiv{width:1px;height:18px;background:rgba(255,255,255,.15)}
.btn{border:none;border-radius:9px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-hdr{padding:7px 14px;font-size:12.5px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.btn-hdr:hover{background:rgba(255,255,255,.15)}
.btn-hdr.danger{background:rgba(204,47,47,.2);color:#ffb3b3}
.btn-hdr.danger:hover{background:rgba(204,47,47,.35)}

.page{max-width:760px;margin:0 auto;padding:26px 20px 60px}
.section-label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:var(--text-mut);margin-bottom:14px}

.qsummary{background:#fff;border-radius:var(--radius);box-shadow:0 4px 20px rgba(17,34,85,.08);padding:16px 22px;margin-bottom:22px;display:flex;align-items:center;gap:26px;flex-wrap:wrap}
.qs-item .num{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.qs-item .num.g{color:var(--green)}.qs-item .num.r{color:var(--red)}.qs-item .num.m{color:var(--text-mut)}
.qs-item .lab{font-size:11.5px;color:var(--text-mut);font-weight:700;margin-top:2px}
.qs-next{margin-left:auto;display:flex;align-items:center;gap:8px}
.qs-next span{font-size:11px;color:var(--text-mut);font-weight:700}
.qs-next input{width:64px;font-size:15px;font-weight:800;text-align:center;padding:7px;border-radius:9px;background:var(--blue-bg);border:1.5px solid var(--border);color:var(--blue);font-family:'Sarabun',sans-serif}

.card{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(17,34,85,.09);overflow:hidden}
.field-block{padding:26px 28px;border-bottom:1px solid #edf0f8}

.piw{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.plate-th{display:flex;align-items:stretch;border-radius:11px;overflow:hidden;box-shadow:0 4px 14px rgba(17,34,85,.18);flex-shrink:0}
.plate-flag{background:linear-gradient(160deg,var(--orange),var(--orange2));width:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 0}
.plate-flag div:first-child{font-size:7.5px;color:#fff;font-weight:900}
.plate-flag .ln{width:16px;height:1px;background:rgba(255,255,255,.5)}
.plate-flag div:last-child{font-size:6px;color:rgba(255,255,255,.8)}
.pc{width:44px;height:56px;background:#fff;border:none;border-left:1px solid #f0f0f5;text-align:center;font-family:'Sarabun',sans-serif;font-size:24px;font-weight:900;color:var(--text);outline:none}
.pc:first-of-type{border-left:none}
.psep{font-size:20px;color:var(--text-mut)}
.pn-wrap{background:#fff;border-radius:11px;overflow:hidden;box-shadow:0 4px 14px rgba(17,34,85,.18);display:flex}
.pn{width:36px;height:56px;background:#fff;border:none;border-left:1px solid #f0f0f5;text-align:center;font-family:'Sarabun',sans-serif;font-size:24px;font-weight:900;color:var(--text);outline:none}
.pn:first-child{border-left:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
select{height:52px;padding:0 14px;border:2px solid var(--border);border-radius:11px;font-family:'Sarabun',sans-serif;font-size:14.5px;font-weight:700;color:var(--text);background:#fff;outline:none;cursor:pointer;width:100%}
select:focus{border-color:var(--blue)}

.svc-hint{font-size:12px;font-weight:700;color:var(--orange);background:#fff4ec;padding:3px 10px;border-radius:20px}
.svc-grid{display:flex;flex-wrap:wrap;gap:10px}
.stag{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:50px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;user-select:none}
.stag input{display:none}
.stag span{font-size:13.5px;font-weight:700;color:var(--text-dim)}
.stag:has(input:checked){border-color:var(--blue);background:var(--blue-bg)}
.stag:has(input:checked) span{color:var(--blue)}

.photo-area{border:2px dashed #c8d4e8;border-radius:14px;padding:26px;text-align:center;cursor:pointer;background:#f6f9fd;transition:all .15s}
.photo-area:hover{border-color:var(--blue);background:#f0f4ff}
.photo-area.has-photo{border-style:solid;border-color:var(--orange);background:#fff8f2}
.photo-preview{width:100%;max-height:200px;object-fit:contain;border-radius:8px;display:none;margin-bottom:10px}
.photo-area.has-photo .photo-preview{display:block}
.photo-area.has-photo .ph-placeholder{display:none}
.ph-icon{font-size:36px;margin-bottom:8px;opacity:.6}
.ph-text{font-size:14.5px;font-weight:800;color:var(--blue);margin-bottom:4px}
.ph-sub{font-size:12.5px;color:var(--text-mut)}
.ph-uploading{font-size:12.5px;color:var(--orange);font-weight:700;margin-top:6px}

.submit-wrap{padding:22px 28px}
.btn-submit{width:100%;padding:18px;background:linear-gradient(135deg,var(--orange) 0%,var(--orange2) 100%);color:#fff;border:none;border-radius:14px;font-family:'Sarabun',sans-serif;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 6px 22px rgba(240,120,32,.4);letter-spacing:.4px;transition:opacity .15s,transform .1s}
.btn-submit:active{transform:scale(.99)}
.btn-submit:disabled{opacity:.55;cursor:not-allowed}
.actions-bar{display:flex;gap:10px;margin-top:12px}
.btn-outline{flex:1;justify-content:center;padding:11px;font-size:13px;background:#fff;border:1.5px solid var(--border);color:var(--text-dim);border-radius:10px}
.btn-outline:hover{background:#f4f7fc}

.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;border-radius:10px;padding:12px 18px;font-size:13.5px;font-weight:700;z-index:300;transform:translateY(80px);opacity:0;transition:all .25s;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{transform:translateY(0);opacity:1}
.toast.green{background:var(--green)}
.toast.red{background:var(--red)}

.zone-modal-overlay{display:none;position:fixed;inset:0;background:rgba(17,34,85,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.zone-modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:440px;max-width:92vw;box-shadow:0 8px 40px rgba(17,34,85,.2)}
.mtitle{font-size:15px;font-weight:800;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);color:var(--navy)}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.zrow{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:7px}
.zrow span{flex:1;font-size:13.5px;font-weight:600}
.btn-sm{padding:6px 10px;font-size:12px;background:#fff;border:1px solid var(--border);color:var(--text-dim);border-radius:7px}
.btn-sm:hover{background:var(--bg);color:var(--blue)}
.mzinput{display:flex;gap:8px;margin-top:4px}
.mzinput input{flex:1;height:42px;padding:0 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'Sarabun',sans-serif;font-size:14px;outline:none}
</style>
</head>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyCFc9wLwD0J9_GcXnJ2xzAVMjnPhVJmwqM",authDomain:"create-98245.firebaseapp.com",databaseURL:"https://create-98245-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"create-98245",storageBucket:"create-98245.firebasestorage.app",messagingSenderId:"490139130684",appId:"1:490139130684:web:a69bfbcb7e61dda952dc39"};
const app=initializeApp(cfg),db=getDatabase(app);
onValue(ref(db,'.info/connected'),s=>{const on=s.val()===true;document.getElementById('cdot').className='conn-dot'+(on?' online':'');document.getElementById('clab').textContent=on?'เชื่อมต่อแล้ว':'ออฟไลน์';});
window._push=()=>set(ref(db,'queue_system'),{queues:window._q,nextNum:window._nn,zones:window._z,calling:window._cid||null,stats:window._stats,ts:Date.now()});
window._pushFull=(st)=>set(ref(db,'queue_system'),{queues:[],nextNum:1,zones:window._z,calling:null,stats:st,ts:Date.now()});
window._ignoreNext=false;
onValue(ref(db,'queue_system'),snap=>{
  if(window._ignoreNext){window._ignoreNext=false;return;}
  const d=snap.val();if(!d)return;
  const fbQ=Array.isArray(d.queues)?d.queues:Object.values(d.queues||{});
  fbQ.forEach(fq=>{
    const local=window._q?.find(x=>x.id===fq.id);
    if(local&&local.status!==fq.status){
      local.status=fq.status;local.note=fq.note||'';
      if(fq.status==='passed')window._notify(`✅ คิว ${String(fq.num).padStart(2,'0')} ผ่านแล้ว`,'green');
      if(fq.status==='failed')window._notify(`❌ คิว ${String(fq.num).padStart(2,'0')} ไม่ผ่าน — ${fq.note||''}`,'red');
      if(fq.status==='calling')window._notify(`📢 คิว ${String(fq.num).padStart(2,'0')} กำลังเรียกลูกค้า`,'');
      if(fq.status==='done')window._notify(`✔ คิว ${String(fq.num).padStart(2,'0')} รับรถแล้ว`,'');
    }
  });
  window._renderStats();
});
</script>

<script>
const CLOUD='db7jrlo6m',PRESET='QueueDoc';
let queues=[],nextNum=1,calId=null,zones=['ลานจอดด้านหน้า','ด้านข้างของร้าน'];
let pendingPhotoUrl='',photoUploading=false,stats={passed:0,failed:0,total:0};
Object.defineProperty(window,'_q',{get:()=>queues});
Object.defineProperty(window,'_nn',{get:()=>nextNum});
Object.defineProperty(window,'_z',{get:()=>zones});
Object.defineProperty(window,'_cid',{get:()=>calId});
Object.defineProperty(window,'_stats',{get:()=>stats});
const push=()=>{window._ignoreNext=true;if(window._push)window._push();};
const p2=n=>String(n).padStart(2,'0');

function mn(el,nid){if(el.value.length>=1&&nid)document.getElementById(nid)?.focus();}
function mnM(el,nid){if(el.value&&!/^[0-9]$/.test(el.value))el.value=el.value.toUpperCase();if(el.value.length>=1&&nid)document.getElementById(nid)?.focus();}

function updateNextNum(v){const n=parseInt(v);if(!isNaN(n)&&n>=1)nextNum=n;}

// ZONES
function rZS(){['zone'].forEach(id=>{const s=document.getElementById(id);if(!s)return;const c=s.value;s.innerHTML=zones.map(z=>`<option${z===c?' selected':''}>${z}</option>`).join('');});}
function openZoneModal(){rZLE();document.getElementById('zm').classList.add('open');}
function closeZoneModal(){document.getElementById('zm').classList.remove('open');}
function rZLE(){document.getElementById('zle').innerHTML=zones.map((z,i)=>`<div class="zrow"><span>${z}</span><button class="btn-sm" onclick="mz(${i},-1)" ${i===0?'disabled':''}>↑</button><button class="btn-sm" onclick="mz(${i},1)" ${i===zones.length-1?'disabled':''}>↓</button><button class="btn-sm" style="color:var(--red)" onclick="dz(${i})">🗑</button></div>`).join('');}
function addZone(){const inp=document.getElementById('zni'),name=inp.value.trim();if(!name)return;zones.push(name);inp.value='';rZS();rZLE();push();toast('เพิ่มแล้ว');}
function dz(i){if(zones.length<=1){toast('ต้องมีอย่างน้อย 1 จุด');return;}zones.splice(i,1);rZS();rZLE();push();}
function mz(i,d){const j=i+d;if(j<0||j>=zones.length)return;[zones[i],zones[j]]=[zones[j],zones[i]];rZS();rZLE();push();}
document.getElementById('zm').addEventListener('click',e=>{if(e.target===document.getElementById('zm'))closeZoneModal();});

// PHOTO — compress → Cloudinary upload (awaited) → base64 fallback if upload fails
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const canvas=document.createElement('canvas'),ctx=canvas.getContext('2d'),img=new Image();
    img.onload=()=>{
      const maxW=800,maxH=800;let w=img.width,h=img.height;
      if(w>maxW){h=h*maxW/w;w=maxW;}if(h>maxH){w=w*maxH/h;h=maxH;}
      canvas.width=w;canvas.height=h;ctx.drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>blob?resolve(blob):reject(new Error('toBlob failed')),'image/jpeg',0.7);
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}
function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=reject;
    r.readAsDataURL(blob);
  });
}
function updateSubmitState(){
  document.getElementById('submit-btn').disabled=photoUploading;
  document.getElementById('ph-uploading').style.display=photoUploading?'block':'none';
}
async function handlePhoto(input){
  const file=input.files[0];if(!file)return;
  const area=document.getElementById('photo-area');
  document.getElementById('photo-preview').src=URL.createObjectURL(file);
  area.classList.add('has-photo');
  photoUploading=true;updateSubmitState();
  let blob;
  try{ blob=await compressImage(file); }
  catch(e){ console.error(e);photoUploading=false;updateSubmitState();toast('ประมวลผลรูปไม่สำเร็จ','red');return; }
  try{
    const fd=new FormData();fd.append('file',blob);fd.append('upload_preset',PRESET);
    const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,{method:'POST',body:fd});
    if(!r.ok)throw new Error('upload failed');
    const d=await r.json();
    if(!d.secure_url)throw new Error('no url');
    pendingPhotoUrl=d.secure_url;
  }catch(e){
    console.warn('Cloudinary upload failed, fallback to base64',e);
    try{ pendingPhotoUrl=await blobToBase64(blob); }
    catch(e2){ console.error(e2);pendingPhotoUrl=''; }
  }
  photoUploading=false;updateSubmitState();
}
function clearPhotoForm(){
  pendingPhotoUrl='';
  document.getElementById('photo-area').classList.remove('has-photo');
  document.getElementById('photo-preview').src='';
  document.getElementById('doc-photo').value='';
}

// ADD
function addQueue(){
  if(photoUploading){toast('กำลังอัปโหลดรูป กรุณารอสักครู่...');return;}
  const c1=document.getElementById('c1').value.trim().toUpperCase(),c2=document.getElementById('c2').value.trim().toUpperCase(),c3=document.getElementById('c3').value.trim().toUpperCase();
  const n1=document.getElementById('n1').value.trim(),n2=document.getElementById('n2').value.trim(),n3=document.getElementById('n3').value.trim(),n4=document.getElementById('n4').value.trim();
  const prov=document.getElementById('province').value,zone=document.getElementById('zone').value;
  const services=[...document.querySelectorAll('#svc-wrap input:checked')].map(x=>x.value);
  if(!c1&&!n1){toast('กรุณากรอกทะเบียนรถ');return;}
  if(!prov){toast('กรุณาเลือกจังหวัด');return;}
  if(!services.length){toast('กรุณาเลือกประเภทบริการ');return;}
  const q={id:Date.now(),num:nextNum++,chars:[c1,c2,c3],nums:[n1,n2,n3,n4],province:prov,zone,status:'waiting',services,photoUrl:pendingPhotoUrl,note:''};
  queues.push(q);
  ['c1','c2','c3','n1','n2','n3','n4'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('#svc-wrap input').forEach(x=>x.checked=false);
  clearPhotoForm();
  document.getElementById('nni').value=nextNum;
  push();renderStats();toast(`✅ ส่งคิว ${p2(q.num)} ให้ช่างแล้ว`,'green');
  document.getElementById('c1').focus();
}

function clearDone(){queues=queues.filter(x=>x.status!=='done');push();renderStats();toast('ล้างแล้ว');}
function clearAllEndOfDay(){
  if(!confirm('⚠️ ล้างข้อมูลทั้งหมดสิ้นวัน?'))return;
  queues=[];calId=null;nextNum=1;stats={passed:0,failed:0,total:0};
  document.getElementById('nni').value=1;
  window._ignoreNext=true;
  if(window._pushFull)window._pushFull({passed:0,failed:0,total:0});
  renderStats();toast('✅ ล้างสิ้นวันแล้ว');
}

function renderStats(){
  document.getElementById('q-count').textContent=queues.length;
  document.getElementById('q-waiting').textContent=queues.filter(x=>x.status==='waiting').length;
  document.getElementById('q-passed').textContent=queues.filter(x=>x.status==='passed').length;
  document.getElementById('q-failed').textContent=queues.filter(x=>x.status==='failed').length;
}
window._renderStats=()=>renderStats();
window._notify=function(msg,type){toast(msg,type);};

setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false}),1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false});

let tt;function toast(m,type){const el=document.getElementById('toast');el.textContent=m;el.className='toast show'+(type?' '+type:'');clearTimeout(tt);tt=setTimeout(()=>el.className='toast',3000);}

rZS();renderStats();
</script>
