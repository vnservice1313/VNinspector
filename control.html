<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ห้องควบคุม — VNservice</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VNservice">
<meta name="theme-color" content="#1a6fe8">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3fa;--surface:#fff;--surface2:#ede9f8;--border:#ddd6f3;--accent:#7c4dff;--accent2:#6535e8;--text:#1e1535;--text-dim:#5c4f80;--text-muted:#9b8ec4;--green:#22c55e;--green-bg:#f0fdf4;--green-bd:#bbf7d0;--red:#ef4444;--red-bg:#fef2f2;--red-bd:#fecaca;--radius:12px;--shadow:0 2px 12px rgba(124,77,255,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(124,77,255,.08)}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#7c4dff,#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.hright{display:flex;align-items:center;gap:12px}
.conn-pill{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted)}
.conn-dot.online{background:var(--green);box-shadow:0 0 5px rgba(34,197,94,.5)}
.conn-text{font-size:11px;color:var(--text-dim);font-weight:600}
.clock{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text-dim);letter-spacing:1px}
.div{width:1px;height:18px;background:var(--border)}
.btn{border:none;border-radius:8px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#fff;padding:12px 24px;font-size:15px;width:100%;justify-content:center;border-radius:12px}
.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:5px 10px;font-size:12px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim)}
.btn-sm:hover{background:var(--surface2);color:var(--accent)}

.page{max-width:600px;margin:0 auto;padding:28px 20px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px}
.field{margin-bottom:18px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
input,select{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px;padding:10px 13px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,77,255,.1)}
input::placeholder{color:var(--text-muted)}
.piw{display:flex;gap:6px;align-items:flex-end}
.pc{width:46px!important;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:700;text-transform:uppercase;padding:10px 4px}
.ps{color:var(--text-muted);font-size:18px;padding-bottom:8px}
.pn{width:40px!important;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:700;padding:10px 3px}

.svc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.stag{display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .15s;user-select:none}
.stag input[type=checkbox]{display:none}
.stag-label{font-size:13px;font-weight:600;color:var(--text-dim)}
.stag:has(input:checked){background:rgba(124,77,255,.08);border-color:var(--accent)}
.stag:has(input:checked) .stag-label{color:var(--accent)}

.photo-area{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:18px}
.photo-area:hover{border-color:#c4b5fd;background:var(--surface2)}
.photo-area.has-photo{border-style:solid;border-color:var(--accent);background:rgba(124,77,255,.04)}
.photo-preview{width:100%;max-height:200px;object-fit:contain;border-radius:8px;display:none;margin-bottom:8px}
.photo-area.has-photo .photo-preview{display:block}
.photo-area.has-photo .ph-placeholder{display:none}
.ph-placeholder .ph-icon{font-size:32px;margin-bottom:8px;opacity:.4}
.ph-placeholder p{font-size:13px;color:var(--text-muted)}

.queue-count{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.qc-num{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;color:var(--accent)}
.qc-label{font-size:13px;color:var(--text-muted);font-weight:600}
.qc-next{font-size:11px;color:var(--text-muted);margin-top:2px}

.next-num-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.next-num-input{width:60px!important;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;text-align:center;padding:6px 8px;border-radius:8px;background:var(--surface2);border:1.5px solid var(--border);color:var(--accent)}

.actions-bar{display:flex;gap:10px;margin-top:8px}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);padding:10px 16px;font-size:13px;border-radius:10px;width:auto}

.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:600;z-index:300;transform:translateY(80px);opacity:0;transition:all .25s;box-shadow:0 8px 24px rgba(124,77,255,.3)}
.toast.show{transform:translateY(0);opacity:1}
.toast.green{background:#22c55e}
.toast.red{background:#ef4444}

.zone-modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,21,53,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.zone-modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:22px;width:440px;max-width:92vw;box-shadow:0 8px 40px rgba(124,77,255,.15)}
.mtitle{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.macts{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.zrow{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">🚗</div>ห้องควบคุม — VNservice</div>
  <div class="hright">
    <div class="conn-pill"><div class="conn-dot" id="cdot"></div><span class="conn-text" id="clab">กำลังเชื่อมต่อ...</span></div>
    <div class="div"></div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="div"></div>
    <button class="btn btn-sm" onclick="openZoneModal()">⚙️ จุดรับรถ</button>
    <div class="div"></div>
    <button class="btn btn-sm" style="background:var(--red-bg);color:var(--red);border-color:var(--red-bd)" onclick="clearAllEndOfDay()">🗑 สิ้นวัน</button>
  </div>
</header>

<div class="page">
  <!-- Queue counter -->
  <div class="queue-count">
    <div>
      <div class="qc-num" id="q-count">0</div>
      <div class="qc-label">คิวทั้งหมดวันนี้</div>
    </div>
    <div style="margin-left:24px">
      <div class="qc-num" id="q-waiting" style="color:var(--text-muted)">0</div>
      <div class="qc-label">รอตรวจ</div>
    </div>
    <div style="margin-left:24px">
      <div class="qc-num" id="q-passed" style="color:var(--green)">0</div>
      <div class="qc-label">ผ่านแล้ว</div>
    </div>
    <div style="margin-left:24px">
      <div class="qc-num" id="q-failed" style="color:var(--red)">0</div>
      <div class="qc-label">ไม่ผ่าน</div>
    </div>
    <div class="next-num-wrap">
      <span style="font-size:11px;color:var(--text-muted);font-weight:700">คิวถัดไป</span>
      <input type="number" class="next-num-input" id="nni" min="1" max="9999" value="1" onchange="updateNextNum(this.value)">
    </div>
  </div>

  <!-- FORM -->
  <div class="field">
    <div class="section-label">ทะเบียนรถ</div>
    <div class="piw">
      <input class="pc" id="c1" maxlength="1" placeholder="ก" oninput="mnM(this,'c2')">
      <input class="pc" id="c2" maxlength="1" placeholder="ข" oninput="mnM(this,'c3')">
      <input class="pc" id="c3" maxlength="1" placeholder="ค" oninput="mnM(this,'n1')">
      <span class="ps">–</span>
      <input class="pn" id="n1" maxlength="1" placeholder="1" oninput="mn(this,'n2')" type="tel">
      <input class="pn" id="n2" maxlength="1" placeholder="2" oninput="mn(this,'n3')" type="tel">
      <input class="pn" id="n3" maxlength="1" placeholder="3" oninput="mn(this,'n4')" type="tel">
      <input class="pn" id="n4" maxlength="1" placeholder="4" type="tel">
    </div>
  </div>

  <div class="row2">
    <div>
      <div class="section-label">จังหวัด</div>
      <select id="province">
        <option value="">-- เลือกจังหวัด --</option>
        <option>กรุงเทพมหานคร</option><option>กระบี่</option><option>กาญจนบุรี</option><option>กาฬสินธุ์</option><option>กำแพงเพชร</option><option>ขอนแก่น</option><option>จันทบุรี</option><option>ฉะเชิงเทรา</option><option>ชลบุรี</option><option>ชัยนาท</option><option>ชัยภูมิ</option><option>ชุมพร</option><option>เชียงราย</option><option>เชียงใหม่</option><option>ตรัง</option><option>ตราด</option><option>ตาก</option><option>นครนายก</option><option>นครปฐม</option><option>นครพนม</option><option>นครราชสีมา</option><option>นครศรีธรรมราช</option><option>นครสวรรค์</option><option>นนทบุรี</option><option>นราธิวาส</option><option>น่าน</option><option>บึงกาฬ</option><option>บุรีรัมย์</option><option>ปทุมธานี</option><option>ประจวบคีรีขันธ์</option><option>ปราจีนบุรี</option><option>ปัตตานี</option><option>พระนครศรีอยุธยา</option><option>พะเยา</option><option>พังงา</option><option>พัทลุง</option><option>พิจิตร</option><option>พิษณุโลก</option><option>เพชรบุรี</option><option>เพชรบูรณ์</option><option>แพร่</option><option>ภูเก็ต</option><option>มหาสารคาม</option><option>มุกดาหาร</option><option>แม่ฮ่องสอน</option><option>ยโสธร</option><option>ยะลา</option><option>ร้อยเอ็ด</option><option>ระนอง</option><option>ระยอง</option><option>ราชบุรี</option><option>ลพบุรี</option><option>ลำปาง</option><option>ลำพูน</option><option>เลย</option><option>ศรีสะเกษ</option><option>สกลนคร</option><option>สงขลา</option><option>สตูล</option><option>สมุทรปราการ</option><option>สมุทรสงคราม</option><option>สมุทรสาคร</option><option>สระแก้ว</option><option>สระบุรี</option><option>สิงห์บุรี</option><option>สุโขทัย</option><option>สุพรรณบุรี</option><option>สุราษฎร์ธานี</option><option>สุรินทร์</option><option>หนองคาย</option><option>หนองบัวลำภู</option><option>อ่างทอง</option><option>อำนาจเจริญ</option><option>อุดรธานี</option><option>อุตรดิตถ์</option><option>อุทัยธานี</option><option>อุบลราชธานี</option>
      </select>
    </div>
    <div>
      <div class="section-label">จุดรับรถ</div>
      <select id="zone"></select>
    </div>
  </div>

  <div class="section-label">ประเภทบริการ</div>
  <div class="svc-grid" id="svc-wrap">
    <label class="stag"><input type="checkbox" value="inspect"><span class="stag-label">🔍 ตรวจสภาพ</span></label>
    <label class="stag"><input type="checkbox" value="register"><span class="stag-label">📋 ต่อทะเบียน</span></label>
    <label class="stag"><input type="checkbox" value="newreg"><span class="stag-label">🆕 จดทะเบียนใหม่</span></label>
    <label class="stag"><input type="checkbox" value="tax"><span class="stag-label">💰 ภาษีขาด&gt;1ปี</span></label>
    <label class="stag"><input type="checkbox" value="transfer"><span class="stag-label">🔄 โอน</span></label>
    <label class="stag"><input type="checkbox" value="province"><span class="stag-label">📍 แจ้งย้ายจังหวัด</span></label>
  </div>

  <div class="section-label">รูปเอกสาร (ไม่บังคับ)</div>
  <div class="photo-area" id="photo-area" onclick="document.getElementById('doc-photo').click()">
    <img class="photo-preview" id="photo-preview" alt="เอกสาร">
    <div class="ph-placeholder">
      <div class="ph-icon">📷</div>
      <p>แตะหรือคลิกเพื่อถ่าย/อัปโหลดรูปเอกสาร</p>
    </div>
    <input type="file" id="doc-photo" accept="image/*" style="display:none" onchange="handlePhoto(this)">
  </div>

  <button class="btn btn-primary" onclick="addQueue()">📤 ส่งข้อมูลให้ช่าง</button>

  <div class="actions-bar">
    <button class="btn btn-sm" onclick="clearDone()" style="flex:1;justify-content:center;padding:10px">🧹 ล้างเสร็จแล้ว</button>
  </div>
</div>

<!-- ZONE MODAL -->
<div class="zone-modal-overlay" id="zm">
  <div class="modal">
    <div class="mtitle">⚙️ จัดการจุดรับรถ</div>
    <div id="zle" style="max-height:260px;overflow-y:auto;margin-bottom:12px"></div>
    <div style="display:flex;gap:7px">
      <input type="text" id="zni" placeholder="ชื่อจุดรับรถใหม่" style="flex:1" onkeydown="if(event.key==='Enter')addZone()">
      <button class="btn btn-primary" style="width:auto;padding:10px 14px" onclick="addZone()">+ เพิ่ม</button>
    </div>
    <div class="macts"><button class="btn btn-sm" onclick="closeZoneModal()">ปิด</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyCFc9wLwD0J9_GcXnJ2xzAVMjnPhVJmwqM",authDomain:"create-98245.firebaseapp.com",databaseURL:"https://create-98245-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"create-98245",storageBucket:"create-98245.firebasestorage.app",messagingSenderId:"490139130684",appId:"1:490139130684:web:a69bfbcb7e61dda952dc39"};
const app=initializeApp(cfg),db=getDatabase(app);
onValue(ref(db,'.info/connected'),s=>{const on=s.val()===true;document.getElementById('cdot').className='conn-dot'+(on?' online':'');document.getElementById('clab').textContent=on?'เชื่อมต่อแล้ว':'ออฟไลน์';});
window._push=()=>set(ref(db,'queue_system'),{queues:window._q,nextNum:window._nn,zones:window._z,calling:window._cid||null,stats:window._stats,ts:Date.now()});
window._pushFull=(st)=>set(ref(db,'queue_system'),{queues:[],nextNum:1,zones:window._z,calling:null,stats:st,ts:Date.now()});
window._ignoreNext=false;
onValue(ref(db,'queue_system'),snap=>{
  if(window._ignoreNext){window._ignoreNext=false;return;}
  const d=snap.val();if(!d)return;
  const fbQ=Array.isArray(d.queues)?d.queues:Object.values(d.queues||{});
  fbQ.forEach(fq=>{
    const local=window._q?.find(x=>x.id===fq.id);
    if(local&&local.status!==fq.status){
      local.status=fq.status;local.note=fq.note||'';
      if(fq.status==='passed')window._notify(`✅ คิว ${String(fq.num).padStart(2,'0')} ผ่านแล้ว`,'green');
      if(fq.status==='failed')window._notify(`❌ คิว ${String(fq.num).padStart(2,'0')} ไม่ผ่าน — ${fq.note||''}`,'red');
      if(fq.status==='calling')window._notify(`📢 คิว ${String(fq.num).padStart(2,'0')} กำลังเรียกลูกค้า`,'');
      if(fq.status==='done')window._notify(`✔ คิว ${String(fq.num).padStart(2,'0')} รับรถแล้ว`,'');
    }
  });
  window._renderStats();
});
</script>

<script>
const CLOUD='db7jrlo6m',PRESET='QueueDoc';
let queues=[],nextNum=1,calId=null,zones=['ลานจอดด้านหน้า','ด้านข้างของร้าน'];
let pendingPhotoUrl='',stats={passed:0,failed:0,total:0};
Object.defineProperty(window,'_q',{get:()=>queues});
Object.defineProperty(window,'_nn',{get:()=>nextNum});
Object.defineProperty(window,'_z',{get:()=>zones});
Object.defineProperty(window,'_cid',{get:()=>calId});
Object.defineProperty(window,'_stats',{get:()=>stats});
const push=()=>{window._ignoreNext=true;if(window._push)window._push();};
const p2=n=>String(n).padStart(2,'0');

function mn(el,nid){if(el.value.length>=1&&nid)document.getElementById(nid)?.focus();}
function mnM(el,nid){if(el.value&&!/^[0-9]$/.test(el.value))el.value=el.value.toUpperCase();if(el.value.length>=1&&nid)document.getElementById(nid)?.focus();}

function updateNextNum(v){const n=parseInt(v);if(!isNaN(n)&&n>=1)nextNum=n;}

// ZONES
function rZS(){['zone'].forEach(id=>{const s=document.getElementById(id);if(!s)return;const c=s.value;s.innerHTML=zones.map(z=>`<option${z===c?' selected':''}>${z}</option>`).join('');});}
function openZoneModal(){rZLE();document.getElementById('zm').classList.add('open');}
function closeZoneModal(){document.getElementById('zm').classList.remove('open');}
function rZLE(){document.getElementById('zle').innerHTML=zones.map((z,i)=>`<div class="zrow"><span style="flex:1;font-size:13px">${z}</span><button class="btn btn-sm" onclick="mz(${i},-1)" ${i===0?'disabled':''}>↑</button><button class="btn btn-sm" onclick="mz(${i},1)" ${i===zones.length-1?'disabled':''}>↓</button><button class="btn btn-sm" style="color:var(--red)" onclick="dz(${i})">🗑</button></div>`).join('');}
function addZone(){const inp=document.getElementById('zni'),name=inp.value.trim();if(!name)return;zones.push(name);inp.value='';rZS();rZLE();push();toast('เพิ่มแล้ว');}
function dz(i){if(zones.length<=1){toast('ต้องมีอย่างน้อย 1 จุด');return;}zones.splice(i,1);rZS();rZLE();push();}
function mz(i,d){const j=i+d;if(j<0||j>=zones.length)return;[zones[i],zones[j]]=[zones[j],zones[i]];rZS();rZLE();push();}
document.getElementById('zm').addEventListener('click',e=>{if(e.target===document.getElementById('zm'))closeZoneModal();});

// PHOTO
async function handlePhoto(input){
  const file=input.files[0];if(!file)return;
  const area=document.getElementById('photo-area');
  document.getElementById('photo-preview').src=URL.createObjectURL(file);
  area.classList.add('has-photo');
  const canvas=document.createElement('canvas'),ctx=canvas.getContext('2d'),img=new Image();
  img.onload=async()=>{
    const maxW=800,maxH=800;let w=img.width,h=img.height;
    if(w>maxW){h=h*maxW/w;w=maxW;}if(h>maxH){w=w*maxH/h;h=maxH;}
    canvas.width=w;canvas.height=h;ctx.drawImage(img,0,0,w,h);
    canvas.toBlob(async blob=>{
      const fd=new FormData();fd.append('file',blob);fd.append('upload_preset',PRESET);
      try{const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,{method:'POST',body:fd});
        const d=await r.json();pendingPhotoUrl=d.secure_url||'';
      }catch(e){console.error(e);}
    },'image/jpeg',0.7);
  };
  img.src=URL.createObjectURL(file);
}
function clearPhotoForm(){
  pendingPhotoUrl='';
  document.getElementById('photo-area').classList.remove('has-photo');
  document.getElementById('photo-preview').src='';
  document.getElementById('doc-photo').value='';
}

// ADD
function addQueue(){
  const c1=document.getElementById('c1').value.trim().toUpperCase(),c2=document.getElementById('c2').value.trim().toUpperCase(),c3=document.getElementById('c3').value.trim().toUpperCase();
  const n1=document.getElementById('n1').value.trim(),n2=document.getElementById('n2').value.trim(),n3=document.getElementById('n3').value.trim(),n4=document.getElementById('n4').value.trim();
  const prov=document.getElementById('province').value,zone=document.getElementById('zone').value;
  const services=[...document.querySelectorAll('#svc-wrap input:checked')].map(x=>x.value);
  if(!c1&&!n1){toast('กรุณากรอกทะเบียนรถ');return;}
  if(!prov){toast('กรุณาเลือกจังหวัด');return;}
  if(!services.length){toast('กรุณาเลือกประเภทบริการ');return;}
  const q={id:Date.now(),num:nextNum++,chars:[c1,c2,c3],nums:[n1,n2,n3,n4],province:prov,zone,status:'waiting',services,photoUrl:pendingPhotoUrl};
  queues.push(q);
  ['c1','c2','c3','n1','n2','n3','n4'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('#svc-wrap input').forEach(x=>x.checked=false);
  clearPhotoForm();
  document.getElementById('nni').value=nextNum;
  push();renderStats();toast(`✅ ส่งคิว ${p2(q.num)} ให้ช่างแล้ว`,'green');
  document.getElementById('c1').focus();
}

function clearDone(){queues=queues.filter(x=>x.status!=='done');push();renderStats();toast('ล้างแล้ว');}
function clearAllEndOfDay(){
  if(!confirm('⚠️ ล้างข้อมูลทั้งหมดสิ้นวัน?'))return;
  queues=[];calId=null;nextNum=1;stats={passed:0,failed:0,total:0};
  document.getElementById('nni').value=1;
  window._ignoreNext=true;
  if(window._pushFull)window._pushFull({passed:0,failed:0,total:0});
  renderStats();toast('✅ ล้างสิ้นวันแล้ว');
}

function renderStats(){
  document.getElementById('q-count').textContent=queues.length;
  document.getElementById('q-waiting').textContent=queues.filter(x=>x.status==='waiting').length;
  document.getElementById('q-passed').textContent=queues.filter(x=>x.status==='passed').length;
  document.getElementById('q-failed').textContent=queues.filter(x=>x.status==='failed').length;
}
window._renderStats=()=>renderStats();
window._notify=function(msg,type){toast(msg,type);};

setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false}),1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false});

let tt;function toast(m,type){const el=document.getElementById('toast');el.textContent=m;el.className='toast show'+(type?' '+type:'');clearTimeout(tt);tt=setTimeout(()=>el.className='toast',3000);}

rZS();renderStats();
</script>
