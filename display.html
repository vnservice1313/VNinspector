.tmid{flex:1;text-align:center;font-size:12.5px;color:var(--txt-mut);font-weight:500}
.tright{display:flex;align-items:center;gap:16px}
.clock-big{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--txt-dim);letter-spacing:1.5px}

.conn-text{font-size:11px;color:var(--txt-dim);font-weight:600}

.main{flex:1;position:relative;overflow:hidden;background:var(--bg-dark)}

#media-wrap{position:absolute;inset:0;z-index:0;background:#000;transition:opacity .5s}
#media-wrap.dimmed{opacity:.15}
#yt-frame{width:100%;height:100%;border:none;display:none}
#mp4-player{width:100%;height:100%;object-fit:cover;display:none}

.idle-icon{font-size:72px;opacity:.15;margin-bottom:16px}
.idle-text{font-size:18px;font-weight:600;color:rgba(255,255,255,.25)}

#qov{position:absolute;inset:0;z-index:5;display:flex;opacity:0;transition:opacity .35s;pointer-events:none}

#qov::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 45%,rgba(240,120,32,.09) 0%,transparent 65%);pointer-events:none}
.ov-calling{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:20px;z-index:1}

.qlist{position:relative;width:330px;background:var(--panel);border-left:1px solid var(--panel-bd);display:flex;flex-direction:column;flex-shrink:0}
.qlist-hd{padding:16px 20px;border-bottom:1px solid var(--panel-bd);font-size:10.5px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--txt-mut)}
.qlist-body{flex:1;overflow-y:auto;padding:14px}
.qi{padding:12px 14px;border-radius:12px;display:flex;align-items:center;gap:11px;border:1px solid var(--panel-bd);background:var(--panel);margin-bottom:8px;transition:all .2s}
.qi.active{background:rgba(240,120,32,.14);border-color:rgba(240,120,32,.4)}
.qi-num{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;background:rgba(255,255,255,.07);color:rgba(255,255,255,.6)}
.qi.active .qi-num{background:var(--orange);color:#fff}
.qi-plate{font-size:16px;font-weight:900;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(255,255,255,.72)}
.qi.active .qi-plate{color:#fff}

.clab{font-size:14px;font-weight:800;letter-spacing:3.5px;text-transform:uppercase;color:var(--txt-mut);display:flex;align-items:center;gap:11px}

const app=initializeApp(cfg),db=getDatabase(app);
onValue(ref(db,'.info/connected'),s=>{

  document.getElementById('clab').textContent=on?'เชื่อมต่อแล้ว':'กำลังเชื่อมต่อ...';

let lastCal=null;
onValue(ref(db,'queue_system'),snap=>{
  const d=snap.val();if(!d)return;
  const{queues=[],calling=null}=d;
  window._rQP(queues,calling);
  const hasPassed=queues.some(x=>x.status==='passed'||x.status==='calling');

  if(calling&&calling!==lastCal){
    const q=queues.find(x=>x.id===calling);
    if(q){
      if(!window._aReady){
        window._pendingQueue=q;
      } else if(!window._isPlaying){
        window._trigger(q,()=>{});
      }
    }
    lastCal=calling;
  } else if(!calling){
    lastCal=null;
    if(!window._currentSource) window._isPlaying=false;
  }

  if(calling){
    const q=queues.find(x=>x.id===calling);
    if(q)window._showStatic(q);
  } else if(hasPassed){

<script>
// ── STATE ──
let actx=null;
window._aReady=false;
window._isPlaying=false;
window._pendingQueue=null;
window._currentSource=null;
let mediaMode='off'; // 'yt' | 'mp4' | 'off'

// ── UNLOCK ──
function unlockStart(){
  try{
    actx=new(window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended')actx.resume();
    window._aReady=true;
    preloadCommon();
  }catch(e){}
  document.getElementById('uov').classList.add('hidden');
  if(window._pendingQueue&&!window._isPlaying){
    window._trigger(window._pendingQueue,()=>{});
    window._pendingQueue=null;
  }
}

// ── CLOCK ──
setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false}),1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false});

// ── SETTINGS ──
function toggleSettings(){document.getElementById('settings-bar').classList.toggle('show');}
function switchTab(tab){
  ['yt','mp4','off'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('panel-'+t).classList.toggle('active',t===tab);
  });
}

// ── MEDIA CONTROL ──
function dimMedia(){document.getElementById('media-wrap').classList.add('dimmed');}
function undimMedia(){document.getElementById('media-wrap').classList.remove('dimmed');}

function stopMedia(){
  mediaMode='off';
  const ytFrame=document.getElementById('yt-frame');
  ytFrame.src='about:blank';
  ytFrame.classList.remove('active');
  const mp4=document.getElementById('mp4-player');
  mp4.pause();mp4.src='';
  mp4.classList.remove('active');
}

function loadYouTube(){
  const url=document.getElementById('yt-url-input').value.trim();
  const m=url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  if(!m){alert('YouTube URL ไม่ถูกต้อง');return;}
  const vid=m[1];
  stopMedia();
  mediaMode='yt';
  const ytFrame=document.getElementById('yt-frame');
  ytFrame.src=`https://www.youtube.com/embed/${vid}?autoplay=1&enablejsapi=1&loop=1&playlist=${vid}&controls=1&mute=0`;
  ytFrame.classList.add('active');
  document.getElementById('mp4-player').classList.remove('active');
  document.getElementById('idle-state').classList.add('hidden');
  toggleSettings();
}

function loadMP4(){
  const url=document.getElementById('mp4-url-input').value.trim();
  if(!url){alert('กรุณาใส่ URL ไฟล์ MP4');return;}
  stopMedia();
  mediaMode='mp4';
  const mp4=document.getElementById('mp4-player');
  mp4.src=url;
  mp4.muted=false;
  mp4.loop=true;
  mp4.classList.add('active');
  document.getElementById('yt-frame').classList.remove('active');
  mp4.play().catch(()=>{mp4.muted=true;mp4.play();});
  document.getElementById('idle-state').classList.add('hidden');
  toggleSettings();
}

function pauseMedia(){
  if(mediaMode==='yt'){
    try{document.getElementById('yt-frame').contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}','*');}catch(e){}
  } else if(mediaMode==='mp4'){
    document.getElementById('mp4-player').pause();
  }
}

function resumeMedia(){
  if(mediaMode==='yt'){
    try{document.getElementById('yt-frame').contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}','*');}catch(e){}
  } else if(mediaMode==='mp4'){
    const mp4=document.getElementById('mp4-player');
    mp4.play().catch(()=>{});
  }
}

// ── CHIME ──
function playChime(cb){
  if(!actx){cb&&cb();return;}
  if(actx.state==='suspended')actx.resume();
  [{f:880,s:0,d:.35},{f:660,s:.4,d:.35},{f:880,s:.8,d:.35},{f:1100,s:1.2,d:.45}].forEach(({f,s,d})=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);o.type='sine';
    o.frequency.setValueAtTime(f,actx.currentTime+s);
    g.gain.setValueAtTime(0,actx.currentTime+s);
    g.gain.linearRampToValueAtTime(.65,actx.currentTime+s+.02);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+s+d);
    o.start(actx.currentTime+s);o.stop(actx.currentTime+s+d+.05);
  });
  setTimeout(()=>{cb&&cb();},1800);
}

// ── GAPLESS AUDIO (Web Audio API + Crossfade) ──
const AUDIO_BASE='Audio/';
const audioCache={};

function stopAllAudio(){
  try{if(window._currentSource){window._currentSource.stop();window._currentSource=null;}}catch(e){}
}

async function loadBuffer(file){
  if(audioCache[file])return audioCache[file];
  try{
    const res=await fetch(AUDIO_BASE+file);
    if(!res.ok)throw new Error('404');
    const arr=await res.arrayBuffer();
    const buf=await actx.decodeAudioData(arr);
    audioCache[file]=buf;
    return buf;
  }catch(e){
    console.warn('โหลดไม่ได้:',file);
    return null;
  }
}

function concatBuffers(buffers){
  const valid=buffers.filter(Boolean);
  if(!valid.length)return null;
  const sr=valid[0].sampleRate;
  const ch=valid[0].numberOfChannels;
  const xf=Math.floor(sr*0.01); // crossfade 10ms
  const total=valid.reduce((s,b,i)=>s+b.length-(i<valid.length-1?xf:0),0);
  const out=actx.createBuffer(ch,total,sr);
  let offset=0;
  for(let bi=0;bi<valid.length;bi++){
    const buf=valid[bi];
    for(let c=0;c<ch;c++){
      const od=out.getChannelData(c);
      const id=buf.getChannelData(c<buf.numberOfChannels?c:0);
      for(let i=0;i<buf.length;i++){
        const pos=offset+i;
        if(pos>=total)break;
        let s=id[i];
        if(bi>0&&i<xf){
          const fi=i/xf;
          s*=fi;
          od[pos]=od[pos]*(1-fi)+s;
          continue;
        }
        if(bi<valid.length-1&&i>=buf.length-xf){
          s*=(buf.length-i)/xf;
        }
        od[pos]=(od[pos]||0)+s;
      }
    }
    offset+=buf.length-(bi<valid.length-1?xf:0);
  }
  return out;
}

async function preloadCommon(){
  if(!actx)return;
  const files=['invite.mp3','queue_at.mp3','plate.mp3','province.mp3','pickup.mp3'];
  await Promise.all(files.map(f=>loadBuffer(f)));
}

async function playSequence(files,cb){
  if(!actx){cb&&cb();return;}
  if(actx.state==='suspended')await actx.resume();
  const buffers=await Promise.all(files.map(f=>loadBuffer(f)));
  const merged=concatBuffers(buffers);
  if(!merged){cb&&cb();return;}
  await new Promise(resolve=>{
    stopAllAudio();
    const src=actx.createBufferSource();
    src.buffer=merged;
    src.playbackRate.value=1.25;
    src.connect(actx.destination);
    window._currentSource=src;
    src.onended=()=>{window._currentSource=null;resolve();};
    src.start(0);
  });
  cb&&cb();
}

// ── BUILD ANNOUNCE FILES ──
function buildAnnounceFiles(q){
  const files=[];
  files.push('invite.mp3');
  files.push('queue_at.mp3');
  files.push(`num_${String(q.num).padStart(2,'0')}.mp3`);
  files.push('plate.mp3');
  q.chars.filter(Boolean).forEach(c=>{
    files.push(/^[0-9]$/.test(c)?`digit_${c}.mp3`:`char_${c}.mp3`);
  });
  q.nums.filter(Boolean).forEach(n=>files.push(`digit_${n}.mp3`));
  files.push('province.mp3');
  files.push(`prov_${q.province}.mp3`);
  files.push('pickup.mp3');
  files.push(`zone_${q.zone}.mp3`);
  return files;
}

// ── TRIGGER ANNOUNCEMENT ──
const p2=n=>String(n).padStart(2,'0');
let calAnim=null;

window._trigger=function(q,doneCb){
  if(window._isPlaying)return;
  window._isPlaying=true;
  stopAllAudio();

  dimMedia(); pauseMedia();
  document.getElementById('idle-state').classList.add('hidden');
  document.getElementById('qov').classList.add('visible');
  animPlate(q);

  const files=buildAnnounceFiles(q);
  Promise.all(files.map(f=>loadBuffer(f))).then(()=>{
    playChime(()=>{
      playSequence(files,()=>{
        setTimeout(()=>{
          playChime(()=>{
            playSequence(files,()=>{
              window._isPlaying=false;
              doneCb&&doneCb();
              setTimeout(()=>{
                undimMedia();
                resumeMedia();
              },800);
            });
          });
        },300);
      });
    });
  });
};

// ── PLATE ANIMATION ──
function animPlate(q){
  if(calAnim)clearInterval(calAnim);
  const cp=document.getElementById('cpanel');
  const all=[...q.chars.filter(Boolean),...q.nums.filter(Boolean)];
  let i=-1;
  cp.innerHTML=buildCH(q,-1);
  calAnim=setInterval(()=>{
    i++;
    if(i>=all.length){clearInterval(calAnim);calAnim=null;cp.innerHTML=buildCH(q,all.length);return;}
    cp.innerHTML=buildCH(q,i);
  },600);
}

function buildCH(q,ci){
  const chars=q.chars.filter(Boolean),nums=q.nums.filter(Boolean);
  const all=[...chars,...nums];
  const lc=chars.length;
  let boxes='';
  all.forEach((ch,i)=>{
    if(i===lc&&lc>0)boxes+=`<div class="pc-sep">–</div>`;
    let cls='pcc'+(i<lc?'':' num');
    if(i<ci)cls+=' done';
    if(i===ci)cls+=' cur';
    boxes+=`<div class="${cls}">${i<=ci?ch:''}</div>`;
  });
  const active=ci>=0;
  return `<div class="clab${active?' active':''}"><div class="cdotp"></div>📢 กรุณารับรถ<div class="cdotp"></div></div>
    <div>
      <div class="qnum-label">คิวที่</div>
      <div class="cnum">${p2(q.num)}</div>
    </div>
    <div class="plate-card${active?' ring':''}">
      <div class="pc-flag"><span>🇹🇭 THAILAND</span><div class="pc-line"></div></div>
      <div class="pc-chars">${boxes}</div>
      <div class="pc-bar"></div>
      <div class="pc-prov">${q.province}</div>
    </div>
    <div class="zonebox">
      <span class="zicon">📍</span>
      <div><div class="zlab">รับรถที่</div><div class="zval">${q.zone}</div></div>
    </div>`;
}

// ── SHOW STATES ──
window._showWaiting=function(){
  if(calAnim){clearInterval(calAnim);calAnim=null;}
  document.getElementById('idle-state').classList.add('hidden');
  document.getElementById('qov').classList.add('visible');
  document.getElementById('cpanel').innerHTML=`
    <div class="clab">รายการรอเรียก</div>
    <div style="font-size:clamp(48px,8vw,80px);opacity:.15">🔇</div>
    <div style="font-size:16px;color:rgba(255,255,255,.4);font-weight:600">ยังไม่มีการเรียกคิว</div>
    <div style="font-size:13px;color:rgba(255,255,255,.25)">รอช่างกด "📢 เรียกลูกค้า"</div>`;
};

window._showStatic=function(q){
  document.getElementById('idle-state').classList.add('hidden');
  document.getElementById('qov').classList.add('visible');
  const cp=document.getElementById('cpanel');
  if(!cp.querySelector('.cnum')){
    if(calAnim){clearInterval(calAnim);calAnim=null;}
    cp.innerHTML=buildCH(q,99);
  }
};

window._showIdle=function(){
  if(calAnim){clearInterval(calAnim);calAnim=null;}
  document.getElementById('qov').classList.remove('visible');
  if(mediaMode==='off'){
    document.getElementById('idle-state').classList.remove('hidden');
  } else {
    document.getElementById('idle-state').classList.add('hidden');
  }
  undimMedia();
  resumeMedia();
};

// ── QUEUE LIST ──
window._rQP=function(queues,calId){
  const active=queues.filter(x=>x.status==='passed'||x.status==='calling');
  const el=document.getElementById('oqbody');
  if(!active.length){
    el.innerHTML=`<div style="text-align:center;padding:30px 0;font-size:12px;color:var(--txt-mut)">ไม่มีคิวรอ</div>`;
    return;
  }
  el.innerHTML=active.map(q=>`
    <div class="qi${q.id===calId?' active':''}">
      <div class="qi-num">${p2(q.num)}</div>
      <div style="flex:1;min-width:0">
        <div class="qi-plate">${q.chars.filter(Boolean).join('')} – ${q.nums.filter(Boolean).join('')}</div>
        <div class="qi-sub">${q.province} · ${q.zone}</div>
      </div>
    </div>`).join('');
};
</script>
