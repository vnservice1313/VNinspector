<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="VN Inspect">
<meta name="theme-color" content="#7c3aed">
<link rel="manifest" href="manifest-inspector.json">
<link rel="apple-touch-icon" href="icon-inspector-192.png">
<title>ช่างตรวจสภาพ — VNservice</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#112255;--purple:#7c3aed;--purple2:#6535e8;--orange:#f07820;--bg:#eef2fa;--surface:#fff;--surface2:#f1f4fb;--border:#dde4f0;--text:#1a2540;--text-dim:#6a7a9a;--text-mut:#9aa4bc;--green:#1a9050;--green-bg:#e5f7ee;--green-bd:#bbf7d0;--red:#cc2f2f;--red-bg:#fde8e8;--red-bd:#f9caca;--yellow:#f07820;--yellow-bg:#fff4ec;--yellow-bd:#fbd0a8;--radius:14px;--shadow:0 2px 12px rgba(17,34,85,.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);font-size:15px;display:flex;flex-direction:column}
.topbar{background:var(--navy);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:900;color:#fff}
.logo-icon{width:30px;height:30px;background:linear-gradient(145deg,var(--purple),var(--purple2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px}
.topbar-right{display:flex;align-items:center;gap:8px}
.conn-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3)}
.conn-dot.online{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.6)}
.clock{font-size:12px;color:rgba(255,255,255,.65)}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.stat-mini{text-align:center;padding:8px 4px;border-radius:10px;background:var(--surface2)}
.stat-mini.s-p{background:var(--green-bg)}.stat-mini.s-f{background:var(--red-bg)}.stat-mini.s-t{background:#eef2fb}
.sm-num{font-size:18px;font-weight:900;color:var(--purple)}
.stat-mini.s-p .sm-num{color:#1a7040}.stat-mini.s-f .sm-num{color:var(--red)}.stat-mini.s-t .sm-num{color:#2856b8}
.sm-label{font-size:9px;font-weight:700;color:var(--text-mut);margin-top:2px;line-height:1.2}

.cards-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.cards-scroll::-webkit-scrollbar{display:none}

.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.card.c-i{border-color:var(--yellow);background:var(--yellow-bg)}
.card.c-p{border-color:var(--green);background:var(--green-bg)}
.card.c-f{border-color:var(--red);background:var(--red-bg)}
.card.c-c{border-color:var(--purple);background:#f8f5ff;box-shadow:0 0 0 3px rgba(124,58,237,.12)}

.card-head{padding:14px;display:flex;align-items:center;gap:12px}
.card-num{font-size:22px;font-weight:900;color:var(--purple);min-width:40px}
.card.c-i .card-num{color:#c05a0a}
.card-plate{font-size:19px;font-weight:900;letter-spacing:1.5px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.tag-prov{background:var(--surface2);color:var(--text-dim)}
.tag-zone{background:#f3e8ff;color:var(--purple);border:1px solid #e9d5ff}
.svc-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:#eef2fb;color:#2856b8;border:1px solid #dbe4f5}

.doc-img{width:calc(100% - 28px);max-height:160px;object-fit:contain;border-radius:8px;border:1px solid var(--border);margin:0 14px 10px;cursor:pointer}
.card-note{font-size:12px;color:var(--text-dim);margin:0 14px 10px;padding:7px 10px;background:#f8f5ff;border-radius:6px;border-left:3px solid var(--purple)}

.card-actions{padding:0 14px 14px;display:flex;gap:7px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:800;font-size:14px;padding:11px 16px;display:inline-flex;align-items:center;gap:6px;flex:1;justify-content:center}
.btn:active{transform:scale(.96)}
.btn-start{background:linear-gradient(135deg,var(--orange),#fbbf24);color:#fff}
.btn-pass{background:linear-gradient(135deg,var(--green),#4ade80);color:#fff}
.btn-fail{background:linear-gradient(135deg,var(--red),#f87171);color:#fff}
.btn-call{background:linear-gradient(135deg,var(--purple),#a78bfa);color:#fff;font-size:15px;padding:14px 20px}
.btn-done{background:var(--green-bg);color:#1a7040;border:1.5px solid var(--green-bd)}
.btn-note-sm{flex:0 0 auto;padding:11px 12px;background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif}

.note-wrap{display:none;padding:0 14px 14px}
.note-wrap.show{display:block}
.note-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;padding:9px 12px;outline:none;resize:none;min-height:60px}
.note-input:focus{border-color:var(--purple)}

.empty{text-align:center;padding:60px 20px;color:var(--text-mut)}
.empty-icon{font-size:40px;opacity:.25;margin-bottom:10px}

.toast{position:fixed;bottom:20px;left:16px;right:16px;background:var(--purple);color:#fff;border-radius:12px;padding:13px 16px;font-size:14px;font-weight:700;z-index:300;transform:translateY(80px);opacity:0;transition:all .25s;text-align:center}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-icon">🔧</div>ห้องตรวจสภาพ</div>
  <div class="topbar-right">
    <div class="conn-dot" id="cdot"></div>
    <div class="clock" id="clock">--:--</div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-mini s-p"><div class="sm-num" id="st-p">0</div><div class="sm-label">✅ ผ่านวันนี้</div></div>
  <div class="stat-mini s-f"><div class="sm-num" id="st-f">0</div><div class="sm-label">❌ ไม่ผ่านวันนี้</div></div>
  <div class="stat-mini"><div class="sm-num" id="st-w">0</div><div class="sm-label">⏳ รอตรวจ</div></div>
  <div class="stat-mini s-t"><div class="sm-num" id="st-t">0</div><div class="sm-label">🚗 รวมวันนี้</div></div>
</div>

<div class="cards-scroll" id="cards">
  <div class="empty"><div class="empty-icon">🚗</div><p>ไม่มีคิวรอตรวจ</p></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyCFc9wLwD0J9_GcXnJ2xzAVMjnPhVJmwqM",authDomain:"create-98245.firebaseapp.com",databaseURL:"https://create-98245-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"create-98245",storageBucket:"create-98245.firebasestorage.app",messagingSenderId:"490139130684",appId:"1:490139130684:web:a69bfbcb7e61dda952dc39"};
const app=initializeApp(cfg),db=getDatabase(app);
onValue(ref(db,'.info/connected'),s=>{const on=s.val()===true;document.getElementById('cdot').className='conn-dot'+(on?' online':'');});

let state={queues:[],zones:[],calling:null,nextNum:1};
let stats={passed:0,failed:0,total:0};

function save(){
  set(ref(db,'queue_system'),{
    queues:state.queues,
    nextNum:state.nextNum||1,
    zones:state.zones,
    calling:state.calling||null,
    stats:{passed:stats.passed,failed:stats.failed,total:stats.total},
    ts:Date.now()
  });
}

onValue(ref(db,'queue_system'),snap=>{
  const d=snap.val();if(!d)return;
  state={queues:Array.isArray(d.queues)?d.queues:Object.values(d.queues||{}),nextNum:d.nextNum||1,zones:d.zones||[],calling:d.calling||null};
  if(d.stats){stats.passed=d.stats.passed||0;stats.failed=d.stats.failed||0;stats.total=d.stats.total||0;}
  renderPage();
});

const SVC={inspect:'🔍 ตรวจสภาพ',register:'📋 ต่อทะเบียน',newreg:'🆕 จดทะเบียนใหม่',tax:'💰 ภาษีขาด>1ปี',transfer:'🔄 โอน',province:'📍 แจ้งย้ายจังหวัด'};
const p2=n=>String(n).padStart(2,'0');

window.startInspect=id=>{const q=state.queues.find(x=>x.id===id);if(!q)return;q.status='inspecting';save();toast(`🔍 เริ่มตรวจ คิว ${p2(q.num)}`);};

window.setResult=function(id,result){
  const q=state.queues.find(x=>x.id===id);if(!q)return;
  const noteEl=document.getElementById('note-'+id);
  q.status=result;q.note=noteEl?noteEl.value.trim():'';
  if(result==='passed'){stats.passed++;stats.total++;}
  if(result==='failed'){stats.failed++;stats.total++;}
  save();
  toast(result==='passed'?`✅ คิว ${p2(q.num)} ผ่าน — กดเรียกลูกค้าได้เลย`:`❌ คิว ${p2(q.num)} ไม่ผ่าน`);
};

window.callQueue=function(id){
  const q=state.queues.find(x=>x.id===id);if(!q)return;
  state.queues.forEach(x=>{if(x.status==='calling')x.status='passed';});
  q.status='calling';state.calling=id;save();
  toast(`📢 เรียกลูกค้า คิว ${p2(q.num)}`);
};

window.markDone=function(id){
  const q=state.queues.find(x=>x.id===id);if(!q)return;
  q.status='done';state.calling=null;save();toast(`✔ คิว ${p2(q.num)} รับรถแล้ว`);
};

window.toggleNote=id=>{document.getElementById('nw-'+id)?.classList.toggle('show');};

function svcTags(s){if(!s?.length)return '';return s.map(v=>`<span class="svc-tag">${SVC[v]||v}</span>`).join('');}

function renderPage(){
  const qs=state.queues;
  document.getElementById('st-w').textContent=qs.filter(x=>x.status==='waiting').length;
  document.getElementById('st-p').textContent=stats.passed;
  document.getElementById('st-f').textContent=stats.failed;
  document.getElementById('st-t').textContent=stats.total;
  const active=qs.filter(x=>['waiting','inspecting','passed','failed','calling'].includes(x.status));
  const el=document.getElementById('cards');
  if(!active.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🚗</div><p>ไม่มีคิวรอตรวจ</p></div>`;return;}
  el.innerHTML=active.map(q=>{
    const cardCls=q.status==='inspecting'?' c-i':q.status==='passed'?' c-p':q.status==='failed'?' c-f':q.status==='calling'?' c-c':'';
    const ph=q.chars.filter(Boolean).join('')+' – '+q.nums.filter(Boolean).join('');
    return `
    <div class="card${cardCls}">
      <div class="card-head">
        <div class="card-num">${p2(q.num)}</div>
        <div style="flex:1">
          <div class="card-plate">${ph}</div>
          <div class="card-tags">
            <span class="tag tag-prov">${q.province}</span>
            <span class="tag tag-zone">${q.zone}</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">${svcTags(q.services||[])}</div>
        </div>
      </div>
      ${q.note?`<div class="card-note">📝 ${q.note}</div>`:''}
      ${q.photoUrl?`<img src="${q.photoUrl}" class="doc-img" onclick="window.open('${q.photoUrl}','_blank')">`:''}
      <div class="card-actions">
        ${q.status==='waiting'?`<button class="btn btn-start" onclick="startInspect(${q.id})">🔍 เริ่มตรวจ</button>`:''}
        ${q.status==='inspecting'?`
          <button class="btn btn-pass" onclick="setResult(${q.id},'passed')">✅ ผ่าน</button>
          <button class="btn btn-fail" onclick="setResult(${q.id},'failed')">❌ ไม่ผ่าน</button>
          <button class="btn-note-sm" onclick="toggleNote(${q.id})">📝</button>`:''}
        ${q.status==='passed'?`<button class="btn btn-call" onclick="callQueue(${q.id})">📢 เรียกลูกค้ารับรถ</button>`:''}
        ${q.status==='calling'?`
          <span style="font-size:13px;font-weight:700;color:var(--purple);padding:10px 14px;background:#f3e8ff;border:1px solid #e9d5ff;border-radius:10px;flex:1;text-align:center">📢 กำลังเรียกอยู่...</span>
          <button class="btn btn-done" onclick="markDone(${q.id})" style="flex:0 0 auto">✅ รับแล้ว</button>`:''}
        ${q.status==='failed'?`
          <span style="font-size:12px;font-weight:700;color:var(--red);padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:10px;flex:1;text-align:center">❌ ไม่ผ่าน</span>
          <button class="btn-note-sm" onclick="toggleNote(${q.id})">📝</button>`:''}
      </div>
      <div class="note-wrap" id="nw-${q.id}">
        <textarea class="note-input" id="note-${q.id}" placeholder="ระบุเหตุผล...">${q.note||''}</textarea>
      </div>
    </div>`;
  }).join('');
}

setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false,hour:'2-digit',minute:'2-digit'}),1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false,hour:'2-digit',minute:'2-digit'});
let tt;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),3000);}
</script>
</body>
</html>
