<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ห้องช่าง — VNservice</title>
<link rel="manifest" href="manifest-inspector.json">
<link rel="apple-touch-icon" href="icon-inspector-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VN Inspect">
<meta name="theme-color" content="#7c3aed">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#112255;--navy2:#0d1a3e;--orange:#f07820;--orange2:#d96010;--bg:#eef2fa;--text:#1a2540;--text-dim:#6a7a9a;--text-mut:#9aa4bc;--border:#dde4f0;--green:#1a9050;--green-bg:#e5f7ee;--green-tc:#1a7040;--red:#cc2f2f;--red-bg:#fde8e8;--red-tc:#aa2020;--blue:#3565d4;--blue-bg:#eef2fb;--blue-tc:#2856b8;--purple:#7c3aed;--purple-bg:#f3e8ff;--purple-tc:#6d28d9;--radius:15px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
header{background:var(--navy);padding:0 26px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 3px 18px rgba(8,16,48,.3)}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:900;color:#fff}
.logo-icon{width:34px;height:34px;background:linear-gradient(145deg,var(--purple),#6535e8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(124,58,237,.4)}
.hright{display:flex;align-items:center;gap:12px}
.conn-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border-radius:20px;padding:5px 12px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35)}
.conn-dot.online{background:#4ade80;box-shadow:0 0 5px rgba(74,222,128,.6)}
.conn-text{font-size:11.5px;color:rgba(255,255,255,.75);font-weight:600}
.clock{font-size:13px;color:rgba(255,255,255,.6);letter-spacing:.5px}
.hdiv{width:1px;height:18px;background:rgba(255,255,255,.15)}

.page{max-width:1080px;margin:0 auto;padding:26px 22px 60px}
.hero{margin-bottom:22px}
.hero-eyebrow{font-size:11.5px;font-weight:800;letter-spacing:2px;color:var(--orange);text-transform:uppercase;margin-bottom:5px}
.hero h1{font-size:25px;font-weight:900;color:var(--navy);letter-spacing:-.5px}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:26px}
.stat{background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 2px 10px rgba(17,34,85,.07);display:flex;align-items:center;gap:13px;border-top:4px solid}
.stat .n{font-size:38px;font-weight:900;line-height:1}
.stat .l{font-size:13.5px;font-weight:800}
.stat .s{font-size:11.5px;color:var(--text-mut);margin-top:1px}
.stat.st-p{border-color:var(--green)}.stat.st-p .n,.stat.st-p .l{color:var(--green)}
.stat.st-f{border-color:var(--red)}.stat.st-f .n,.stat.st-f .l{color:var(--red)}
.stat.st-w{border-color:var(--orange)}.stat.st-w .n,.stat.st-w .l{color:var(--orange)}
.stat.st-t{border-color:var(--blue)}.stat.st-t .n,.stat.st-t .l{color:var(--blue)}

.section-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-mut);margin-bottom:14px}
.cards{display:flex;flex-direction:column;gap:11px}
.card{background:#fff;border-radius:var(--radius);box-shadow:0 2px 12px rgba(17,34,85,.07);overflow:hidden;border-left:5px solid;padding:16px 22px;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 18px rgba(17,34,85,.12)}
.card-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.qnum-badge{width:56px;height:56px;background:var(--navy);border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.qnum-badge .l{font-size:8.5px;color:rgba(255,255,255,.5);font-weight:700}
.qnum-badge .n{font-size:26px;font-weight:900;color:#fff;line-height:1}
.card-info{flex:1;min-width:180px}
.plate-row{display:flex;align-items:baseline;gap:10px;margin-bottom:5px}
.plate-row .p{font-size:23px;font-weight:900;color:var(--text);letter-spacing:2px}
.plate-row .prov{font-size:13.5px;color:var(--text-dim);font-weight:600}
.meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-row .zone{font-size:13px;color:var(--text-mut)}
.note-badge{font-size:12px;font-weight:700;color:var(--red-tc);background:var(--red-bg);padding:3px 10px;border-radius:20px}
.svc-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.svc-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap}
.status-pill{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:800;flex-shrink:0;letter-spacing:.3px}
.card-actions{display:flex;gap:8px;flex-shrink:0;align-items:center}
.act-btn{padding:11px 20px;border-radius:11px;border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:800;white-space:nowrap;transition:transform .1s,opacity .1s;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.act-btn:active{transform:scale(.96);opacity:.9}
.act-btn.start{background:var(--blue-tc);color:#fff}
.act-btn.pass{background:var(--green);color:#fff}
.act-btn.fail{background:var(--red);color:#fff}
.act-btn.call{background:var(--purple);color:#fff}
.act-btn.done{background:var(--green-bg);color:var(--green-tc);border:1px solid #bbf7d0;box-shadow:none}
.act-btn.note{background:#f1f4fa;color:var(--text-dim);box-shadow:none;border:1px solid var(--border)}
.calling-tag{font-size:13.5px;font-weight:700;color:var(--purple);padding:8px 14px;background:var(--purple-bg);border:1px solid #e9d5ff;border-radius:10px}

.note-wrap{margin-top:12px;display:none}
.note-wrap.show{display:block}
.note-input{width:100%;background:#f6f9fd;border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;padding:10px 13px;outline:none;resize:none;min-height:56px}
.note-input:focus{border-color:var(--blue-tc)}
.doc-img{max-width:220px;max-height:150px;object-fit:contain;border-radius:9px;border:1px solid var(--border);margin-top:12px;cursor:pointer;display:block}

.empty{text-align:center;padding:70px 20px;color:var(--text-mut)}
.eicon{font-size:54px;opacity:.2;margin-bottom:12px}

.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;border-radius:10px;padding:12px 18px;font-size:13.5px;font-weight:700;z-index:300;transform:translateY(80px);opacity:0;transition:all .25s;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">🔧</div>VNservice — ห้องช่าง</div>
  <div class="hright">
    <div class="conn-pill"><div class="conn-dot" id="cdot"></div><span class="conn-text" id="clab">กำลังเชื่อมต่อ...</span></div>
    <div class="hdiv"></div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="page">
  <div class="hero">
    <div class="hero-eyebrow">ห้องช่าง</div>
    <h1>คิวตรวจสภาพ</h1>
  </div>

  <div class="stats-bar">
    <div class="stat st-p"><div><div class="n" id="st-p">0</div><div class="l">ผ่านแล้ว</div></div><div class="s">คัน</div></div>
    <div class="stat st-f"><div><div class="n" id="st-f">0</div><div class="l">ไม่ผ่าน</div></div><div class="s">คัน</div></div>
    <div class="stat st-w"><div><div class="n" id="st-w">0</div><div class="l">รอตรวจ</div></div><div class="s">คัน</div></div>
    <div class="stat st-t"><div><div class="n" id="st-t">0</div><div class="l">รวมวันนี้</div></div><div class="s">คัน</div></div>
  </div>

  <div class="section-title">คิวรอตรวจสภาพ</div>
  <div class="cards" id="cards"><div class="empty"><div class="eicon">🚗</div><p>ไม่มีคิวรอตรวจ</p></div></div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyCFc9wLwD0J9_GcXnJ2xzAVMjnPhVJmwqM",authDomain:"create-98245.firebaseapp.com",databaseURL:"https://create-98245-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"create-98245",storageBucket:"create-98245.firebasestorage.app",messagingSenderId:"490139130684",appId:"1:490139130684:web:a69bfbcb7e61dda952dc39"};
const app=initializeApp(cfg),db=getDatabase(app);
onValue(ref(db,'.info/connected'),s=>{const on=s.val()===true;document.getElementById('cdot').className='conn-dot'+(on?' online':'');document.getElementById('clab').textContent=on?'เชื่อมต่อแล้ว':'ออฟไลน์';});

let state={queues:[],zones:[],calling:null};
let stats={passed:0,failed:0,total:0};

function save(){set(ref(db,'queue_system'),{queues:state.queues,nextNum:state.nextNum||1,zones:state.zones,calling:state.calling||null,stats,ts:Date.now()});}

onValue(ref(db,'queue_system'),snap=>{
  const d=snap.val();if(!d)return;
  state={queues:Array.isArray(d.queues)?d.queues:Object.values(d.queues||{}),nextNum:d.nextNum||1,zones:d.zones||[],calling:d.calling||null};
  if(d.stats){stats.passed=d.stats.passed||0;stats.failed=d.stats.failed||0;stats.total=d.stats.total||0;}
  renderPage();
});

const STATUS={
  waiting:{label:'รอตรวจ',border:'#3565d4',bg:'#eef2fb',tc:'#2856b8'},
  inspecting:{label:'กำลังตรวจ',border:'#f07820',bg:'#fff4ec',tc:'#c05a0a'},
  passed:{label:'ผ่านแล้ว',border:'#1a9050',bg:'#e5f7ee',tc:'#1a7040'},
  failed:{label:'ไม่ผ่าน',border:'#cc2f2f',bg:'#fde8e8',tc:'#aa2020'},
  calling:{label:'กำลังเรียก',border:'#7c3aed',bg:'#f3e8ff',tc:'#6d28d9'},
  done:{label:'เสร็จแล้ว',border:'#94a3b8',bg:'#f1f5f9',tc:'#64748b'}
};
const SVC={
  inspect:{label:'🔍 ตรวจสภาพ',tc:'#2856b8',bg:'#eef2fb'},
  register:{label:'📋 ต่อทะเบียน',tc:'#7c3aed',bg:'#f3e8ff'},
  newreg:{label:'🆕 จดทะเบียนใหม่',tc:'#0891b2',bg:'#ecfeff'},
  tax:{label:'💰 ภาษีขาด>1ปี',tc:'#b45309',bg:'#fef3c7'},
  transfer:{label:'🔄 โอน',tc:'#1a9050',bg:'#e5f7ee'},
  province:{label:'📍 แจ้งย้ายจังหวัด',tc:'#c2410c',bg:'#fff7ed'}
};
const p2=n=>String(n).padStart(2,'0');

window.startInspect=function(id){const q=state.queues.find(x=>x.id===id);if(!q)return;q.status='inspecting';save();toast(`เริ่มตรวจ คิว ${p2(q.num)}`);};

window.setResult=function(id,result){
  const q=state.queues.find(x=>x.id===id);if(!q)return;
  const noteEl=document.getElementById('note-'+id);
  q.status=result;q.note=noteEl?noteEl.value.trim():'';
  if(result==='passed'){stats.passed++;stats.total++;}
  if(result==='failed'){stats.failed++;stats.total++;}
  save();
  toast(result==='passed'?`✅ คิว ${p2(q.num)} ผ่าน — กดเรียกลูกค้าได้เลย`:`❌ คิว ${p2(q.num)} ไม่ผ่าน`);
};

window.callQueue=function(id){
  const q=state.queues.find(x=>x.id===id);if(!q)return;
  state.queues.forEach(x=>{if(x.status==='calling')x.status='passed';});
  q.status='calling';state.calling=id;save();
  toast(`📢 เรียกลูกค้า คิว ${p2(q.num)}`);
};

window.markDone=function(id){
  const q=state.queues.find(x=>x.id===id);if(!q)return;
  q.status='done';state.calling=null;save();toast(`✔ คิว ${p2(q.num)} รับรถแล้ว`);
};

window.toggleNote=function(id){const w=document.getElementById('nw-'+id);if(w)w.classList.toggle('show');};

function svcBadges(svcs){
  if(!svcs?.length)return '';
  return svcs.map(s=>{const sv=SVC[s]||{label:s,bg:'#eee',tc:'#333'};return `<span class="svc-badge" style="background:${sv.bg};color:${sv.tc}">${sv.label}</span>`;}).join('');
}

function renderPage(){
  const qs=state.queues;
  document.getElementById('st-w').textContent=qs.filter(x=>x.status==='waiting').length;
  document.getElementById('st-p').textContent=stats.passed;
  document.getElementById('st-f').textContent=stats.failed;
  document.getElementById('st-t').textContent=stats.total;

  const active=qs.filter(x=>['waiting','inspecting','passed','failed','calling'].includes(x.status));
  const el=document.getElementById('cards');
  if(!active.length){el.innerHTML=`<div class="empty"><div class="eicon">🚗</div><p>ไม่มีคิวรอตรวจ</p></div>`;return;}

  el.innerHTML=active.map(q=>{
    const s=STATUS[q.status]||STATUS.waiting;
    const plate=q.chars.filter(Boolean).join('')+' – '+q.nums.filter(Boolean).join('');
    let actions='';
    if(q.status==='waiting')actions=`<button class="act-btn start" onclick="startInspect(${q.id})">🔍 เริ่มตรวจ</button>`;
    else if(q.status==='inspecting')actions=`
      <button class="act-btn pass" onclick="setResult(${q.id},'passed')">✅ ผ่าน</button>
      <button class="act-btn fail" onclick="setResult(${q.id},'failed')">❌ ไม่ผ่าน</button>
      <button class="act-btn note" onclick="toggleNote(${q.id})">📝 หมายเหตุ</button>`;
    else if(q.status==='passed')actions=`<button class="act-btn call" onclick="callQueue(${q.id})">📢 เรียกลูกค้ารับรถ</button>`;
    else if(q.status==='calling')actions=`<span class="calling-tag">📢 กำลังเรียกอยู่...</span><button class="act-btn done" onclick="markDone(${q.id})">✅ รับรถแล้ว</button>`;
    else if(q.status==='failed')actions=`<span class="calling-tag" style="color:var(--red-tc);background:var(--red-bg);border-color:#f9caca">❌ ไม่ผ่าน — แจ้งพนักงานแล้ว</span><button class="act-btn note" onclick="toggleNote(${q.id})">📝 แก้หมายเหตุ</button>`;

    return `
    <div class="card" style="border-color:${s.border}">
      <div class="card-top">
        <div class="qnum-badge"><div class="l">คิวที่</div><div class="n">${q.num}</div></div>
        <div class="card-info">
          <div class="plate-row"><span class="p">${plate}</span><span class="prov">${q.province}</span></div>
          <div class="meta-row">
            <span class="zone">📍 ${q.zone}</span>
            ${q.note?`<span class="note-badge">⚠️ ${q.note}</span>`:''}
          </div>
        </div>
        <div class="svc-badges">${svcBadges(q.services||[])}</div>
        <div class="status-pill" style="background:${s.bg};color:${s.tc}">${s.label}</div>
        <div class="card-actions">${actions}</div>
      </div>
      ${q.photoUrl?`<img src="${q.photoUrl}" class="doc-img" onclick="window.open('${q.photoUrl}','_blank')">`:''}
      <div class="note-wrap" id="nw-${q.id}">
        <textarea class="note-input" id="note-${q.id}" placeholder="ระบุเหตุผล เช่น ไฟเบรกเสีย...">${q.note||''}</textarea>
      </div>
    </div>`;
  }).join('');
}

setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false}),1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false});
let tt;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),3000);}
window.toast=toast;
</script>
</body>
</html>
